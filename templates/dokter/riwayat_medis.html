<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Riwayat Rekam Medis</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-6">
    <div class="max-w-5xl mx-auto">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-slate-800"> Riwayat Rekam Medis</h1>
            <p class="text-slate-500 mt-1"> Data pemeriksaan pasien yang telah selesai diperiksa.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <div class="bg-slate-800 px-6 py-4">
                <h2 class="text-white text-xl font-semibold">Data Rekam Medis</h2>
            </div>

            <table class="w-full text-left">
                <thead class="bg-slate-100">
                    <tr>
                        <th class="p-4 font-semibold text-slate-700">Tanggal</th>
                        <th class="p-4 font-semibold text-slate-700"> Nama Pasien</th>
                        <th class="p-4 font-semibold text-slate-700">Diagnosa</th>
                    </tr>
                </thead>

                <tbody>
                    {% for r in riwayat %}
                    <tr class="border-b hover:bg-slate-50 transition">
                        <td class="p-4"> {{ r.tanggal_periksa }}</td>
                        <td class="p-4 font-semibold text-slate-800"> {{ r.nama }}</td>
                        <td class="p-4">
                            <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm">
                                {{ r.diagnosa }}
                            </span>
                        </td>
                    </tr>

                    {% else %}
                    <tr>
                        <td colspan="3" class="p-8 text-center text-slate-500">Belum ada data rekam medis</td>
                    </tr>
                    {% endfor %}

                </tbody>
            </table>
        </div>

        <div class="mt-6">
            <a href="/dokter" class="inline-block bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl transition">
                ← Kembali ke Dashboard
            </a>
        </div>
    </div>
</body>
</html>
