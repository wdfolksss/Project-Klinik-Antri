<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLINIK ANTRI</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">

    <section class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-4xl w-full">

            <div class="bg-white rounded-3xl shadow-xl overflow-hidden">

                <div class="bg-gradient-to-r from-emerald-500 to-teal-600 p-10 text-white text-center">

                    <h1 class="text-4xl font-bold mb-3">
                        🏥 KLINIK ANTRI
                    </h1>

                    <p class="text-emerald-100">
                        Sistem Antrean Layanan Kesehatan Digital
                    </p>

                </div>

                <div class="p-8">

                    <div class="grid md:grid-cols-2 gap-6">

                        <a href="/registrasi"
                           class="bg-emerald-50 border border-emerald-200 rounded-2xl p-6 hover:bg-emerald-100 transition">

                            <div class="text-4xl mb-3">📝</div>

                            <h2 class="font-semibold text-lg text-slate-800">
                                Registrasi Pasien
                            </h2>

                            <p class="text-slate-500 mt-2">
                                Daftarkan data pasien baru.
                            </p>

                        </a>

                        <a href="#"
                           class="bg-blue-50 border border-blue-200 rounded-2xl p-6 hover:bg-blue-100 transition">

                            <div class="text-4xl mb-3">🎫</div>

                            <h2 class="font-semibold text-lg text-slate-800">
                                Ambil Nomor Antrean
                            </h2>

                            <p class="text-slate-500 mt-2">
                                Ambil nomor antrean sesuai poli.
                            </p>

                        </a>

                        <a href="#"
                           class="bg-orange-50 border border-orange-200 rounded-2xl p-6 hover:bg-orange-100 transition">

                            <div class="text-4xl mb-3">👨‍⚕️</div>

                            <h2 class="font-semibold text-lg text-slate-800">
                                Dashboard Dokter
                            </h2>

                            <p class="text-slate-500 mt-2">
                                Kelola antrean dan rekam medis.
                            </p>

                        </a>

                        <a href="#"
                           class="bg-purple-50 border border-purple-200 rounded-2xl p-6 hover:bg-purple-100 transition">

                            <div class="text-4xl mb-3">📊</div>

                            <h2 class="font-semibold text-lg text-slate-800">
                                Laporan Klinik
                            </h2>

                            <p class="text-slate-500 mt-2">
                                Statistik dan laporan pelayanan.
                            </p>

                        </a>

                    </div>

                </div>

            </div>

        </div>
    </section>

</body>
</html>
